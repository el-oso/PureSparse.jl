name = "PureSparse"
uuid = "ec4be3f8-c56a-4afe-9cdb-3d99b644fbd7"
version = "0.1.0"
authors = ["el-oso <15278831+el-oso@users.noreply.github.com>"]

[deps]
LinearAlgebra = "37e2e46d-f89d-539d-b4ee-838fcccc9c8e"
Preferences = "21216c6a-2e73-6563-6e65-726566657250"
PureBLAS = "cc9e14db-574f-4602-bf53-1167cc4b26d2"
SparseArrays = "2f01184e-e22b-5df5-ae63-d93ebab69eaf"
StrictMode = "0e98b4f4-d0e6-42ac-af0a-707c24852f32"
TypeContracts = "c7a3f1e2-84b5-4d69-9e0a-1f2b3c4d5e6f"

[compat]
LinearAlgebra = "1.12.0"
Preferences = "1.5.2"
PureBLAS = "0.1.0"
SparseArrays = "1.12.0"
StrictMode = "0.3.7"
TypeContracts = "0.14.0"
julia = "1.12"
ForwardDiff = "0.10, 1"

# Weak dep: AD support (P2). The frontal path is generic over real isbits `T`, but its
# `QRStats.dropped_norm` diagnostic needs a Float64 primal, and `Float64(::ForwardDiff.Dual)`
# is deliberately undefined. This extension supplies `_stat_f64(::Dual)` -> primal, so
# `src` carries NO ForwardDiff dependency and it only loads when a user has ForwardDiff.
[weakdeps]
ForwardDiff = "f6369f11-7733-5829-9624-2563aa707210"

[extensions]
PureSparseForwardDiffExt = "ForwardDiff"

# PureBLAS is not yet registered (Pure Julia Ecosystem sibling, same convention as
# StrictMode/TypeContracts before they were registered). A local `Pkg.develop(path=
# "../PureBLAS.jl")` Manifest override works for local development (gitignored,
# per-workstation), but CI/a fresh clone has no Manifest and no sibling checkout to
# fall back to — this `[sources]` entry is what makes `Pkg.instantiate()` resolvable
# from nothing but this file (Julia 1.11+ feature).
[sources]
PureBLAS = {url = "https://github.com/el-oso/PureBLAS.jl", rev = "master"}
